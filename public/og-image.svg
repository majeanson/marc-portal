<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15120f"/>
      <stop offset="100%" stop-color="#0e0c0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4a255"/>
      <stop offset="100%" stop-color="#e8b865"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a2420" stroke-width="1" opacity="0.5">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
  </g>

  <!-- top eyebrow -->
  <text x="80" y="100" font-family="Cascadia Code, JetBrains Mono, monospace" font-size="22" fill="#7a6a5a" letter-spacing="3">
    SIDE-PRATIQUE · QUÉBEC · ASYNC
  </text>

  <!-- brand -->
  <text x="80" y="200" font-family="Cascadia Code, JetBrains Mono, monospace" font-size="44" font-weight="700" fill="#e8ddd4">
    marc<tspan fill="url(#accent)">.</tspan>portal
  </text>

  <!-- main line FR -->
  <text x="80" y="305" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="#e8ddd4">
    Dev à Québec.
  </text>
  <text x="80" y="370" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="#e8ddd4">
    Job de jour.
  </text>
  <text x="80" y="435" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">
    Le soir, j’aide.
  </text>

  <!-- subtitle -->
  <text x="80" y="488" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="22" fill="#b0a49c">
    Petits problèmes du quotidien · async · pas de calls · démos testables
  </text>

  <!-- footer ribbon -->
  <text x="80" y="575" font-family="Cascadia Code, JetBrains Mono, monospace" font-size="20" fill="#7a6a5a" letter-spacing="2">
    1 PROJET ACTIF  ·  WAITLIST 3  ·  PROCHAIN DÉPART ≈ 15 AOÛT
  </text>
</svg>
