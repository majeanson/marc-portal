name: lighthouse

# After every successful deploy, run Lighthouse against the LIVE production
# site (marcportal.com), append the four category scores to
# src/data/lighthouse-history.json, and commit that file back. The git
# history of that file is the score timeline; the /meta scorecard imports it
# and shows the latest run.
#
# Why workflow_run and not push: measuring the deployed site means waiting
# for the deploy to finish — so this chains off the deploy workflow instead
# of racing it.
#
# Loop guard: the commit carries [skip ci], so the deploy workflow skips it,
# which means this workflow's workflow_run trigger never fires for it.

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
  workflow_dispatch:

# Serialise runs so two deploys can't race the commit-back push.
concurrency:
  group: lighthouse
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lighthouse:
    # A manual run always proceeds; a workflow_run only after a green deploy.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      # The commit that was actually deployed (the deploy run's head), or the
      # branch head for a manual run.
      LH_COMMIT: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Run Lighthouse against production
        run: |
          # Give Cloudflare Pages a moment to point the production alias at
          # the just-finished deploy before measuring it.
          sleep 15
          npx --yes lighthouse@12 https://marcportal.com/ \
            --output=json --output-path=./lh-report.json --quiet \
            --only-categories=performance,accessibility,best-practices,seo \
            --chrome-flags="--headless --no-sandbox"

      - name: Append the run to the history
        run: node scripts/append-lighthouse.mjs ./lh-report.json

      - name: Commit the history back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/lighthouse-history.json
          if git diff --cached --quiet; then
            echo "lighthouse: no change to commit"
          else
            git commit -m "chore(lighthouse): record scores for ${LH_COMMIT::7} [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
