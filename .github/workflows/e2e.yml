name: e2e

# Full E2E gate — `npm run e2e` runs every spec under e2e/: the smoke
# wayfinding checks, the full-tour click coverage (full-tour.spec.ts), the
# axe a11y scan, and the visual-regression + error-state screenshots.
# Runs on windows-latest so Chromium's rasterisation matches the Windows
# machine the baselines were generated on — a Linux runner would diff every
# screenshot on font anti-aliasing.
#
# Cost note: windows-latest is billed at 2x the Linux rate and this run
# takes ~30 min, so it does NOT trigger on every push to main — only on
# pull_request (one run per PR) and manual dispatch. Direct pushes to main
# skip the gate; open a PR or `gh workflow run e2e.yml` to exercise it.

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# One e2e run per ref — a newer push cancels the older still-running e2e
# instead of stacking a second 30-min Windows job alongside it.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
