name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # write so the auto-stamp step can push back
      deployments: write
    steps:
      - uses: actions/checkout@v4
        # Need history so git diff-tree in stamp-revisions.mjs can resolve the
        # commit's parent.
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Chromium for the homepage prerender — `npm run build` triggers the
      # `postbuild` script (scripts/prerender.mjs), which drives Playwright to
      # snapshot the homepage to static HTML. Mirrors e2e.yml. ~30s added.
      - run: npx playwright install --with-deps chromium
      - run: npm run build

      # Apply any pending D1 migrations before the deploy. Idempotent — wrangler
      # no-ops migrations that are already applied. Without this step the code
      # ships with schema-ahead expectations and the API 500s until someone
      # runs `npm run db:migrate:prod` by hand.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply marc-portal-db --remote

      # Cloudflare's deployments API rejects commit messages containing some
      # multi-byte UTF-8 chars (we hit it on a body with U+2192 right-arrows)
      # with "Invalid commit message, it must be a valid UTF-8 string. [code:
      # 8000111]" — a misleading error, since the bytes ARE valid UTF-8;
      # their parser just doesn't accept the full range. Pre-fold the subject
      # to ASCII so the deploy never trips on copy choices. Body is dropped
      # too — the CF dashboard only surfaces the subject anyway.
      - id: commit-msg
        name: Compute deploy-safe commit message
        shell: bash
        run: |
          subject=$(git log -1 --format=%s)
          safe=$(printf '%s' "$subject" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null || printf '%s' "$subject" | tr -cd '\11\12\15\40-\176')
          # ASCII alone isn't enough: the wrangler-action interpolates this value
          # into a double-quoted `--commit-message="…"` arg, so a literal " in the
          # subject (e.g. a quoted PR title like 'regroup "Bring me anything"') closes
          # that quote early and wrangler parses the tail as stray positionals — the
          # deploy dies with "Unknown arguments". Drop the four chars that can break
          # out of, or expand inside, a double-quoted shell word: " ` $ \. Cosmetic
          # only — the CF dashboard just shows the subject without them.
          safe="${safe//\"/}"
          safe="${safe//\`/}"
          safe="${safe//\$/}"
          safe="${safe//\\/}"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - id: deploy
        name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=marc-portal --commit-message="${{ steps.commit-msg.outputs.safe }}"

      # Auto-stamp the latest revision in each feature.json touched by this
      # commit with the deployment URL we just got. The bot pushes the stamping
      # changes back to main with [skip ci] so we don't loop into another deploy.
      - name: Stamp revisions with build URL
        if: steps.deploy.outputs.deployment-url != ''
        run: node scripts/stamp-revisions.mjs "${{ github.sha }}" "${{ steps.deploy.outputs.deployment-url }}"

      - name: Commit + push stamps
        if: steps.deploy.outputs.deployment-url != ''
        run: |
          # Scope the guard to feature.jsons only — `npm run build` regenerates
          # other files (e.g. public/sitemap.xml via prebuild) and we don't want
          # that drift to make `git commit` fail with "nothing to commit".
          # feature.json files are co-located next to their code now
          # (src/**/*.feature.json, functions/**/*.feature.json) plus the root
          # feature.json; the '*.feature.json' git pathspec matches all of them.
          if git diff --quiet -- feature.json '*.feature.json'; then
            echo "No revisions to stamp."
            exit 0
          fi
          git config user.name 'lac-stamp-bot'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add feature.json '*.feature.json'
          git commit -m "chore(lac): stamp revisions for ${GITHUB_SHA::7} [skip ci]"
          # The lighthouse workflow auto-commits lighthouse-history.json back to
          # this same branch after every deploy. If a prior deploy's lighthouse
          # commit lands between our fetch (in actions/checkout) and our push,
          # the bare push is rejected as non-fast-forward. Rebase our stamp
          # commit onto the remote tip first — lighthouse touches a disjoint
          # file (src/data/lighthouse-history.json) so it never conflicts with
          # our feature.json stamps. Same pattern as e2e-snapshots.yml.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # Auto-stamp un-stamped session_advancements rows with the same deploy
      # URL. Mirrors the feature.json pipeline above but writes to D1 instead
      # of the repo. Idempotent — only rows with build_url IS NULL are
      # touched.
      - name: Stamp session advancements with build URL
        if: steps.deploy.outputs.deployment-url != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/stamp-session-advancements.mjs "${{ github.sha }}" "${{ steps.deploy.outputs.deployment-url }}"
