name: e2e-snapshots

# Manually-triggered baseline regenerator. Visual baselines must be made on
# the SAME environment that the e2e gate runs on — a full-page screenshot's
# height rounds 1px differently between a local Windows box and the
# windows-latest runner, which fails every diff. Running --update-snapshots
# here, on the runner, and committing the result keeps baselines and the
# gate on identical ground.
#
# Trigger: Actions tab → e2e-snapshots → Run workflow (or `gh workflow run`).

on:
  workflow_dispatch:

# Two overlapping runs both regenerate the SAME baseline PNGs, so the later
# one's `git pull --rebase` hits an unresolvable binary conflict on every
# screenshot. Queue runs instead of cancelling — a cancelled run can still
# have pushed its commit before the cancel landed, which is what caused that
# conflict. Queued, the second run checks out the first's result and finds
# nothing to regenerate.
concurrency:
  group: e2e-snapshots
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write
      # actions: write — needed for the `gh workflow run` trigger step below.
      actions: write
    steps:
      - uses: actions/checkout@v4
        # Full history so `git pull --rebase` before the commit-back push has
        # a real merge base to rebase onto (a shallow clone can't).
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Regenerate visual baselines
        continue-on-error: true
        run: npx playwright test screenshots.spec.ts error-states.spec.ts --update-snapshots
      # The atelier gallery manifest's `fullH` is derived from each baseline
      # PNG's pixel height. Regenerate it here so it doesn't silently drift
      # from the screenshots this run just refreshed.
      - name: Sync the atelier gallery manifest
        if: always()
        run: node scripts/build-atelier-gallery.mjs
      - name: Commit regenerated baselines
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/__screenshots__ src/data/atelier-gallery.json
          if git diff --cached --quiet; then
            echo "no baseline changes"
          else
            git commit -m "chore(e2e): regenerate visual baselines + atelier manifest on the CI runner"
            # The lighthouse workflow auto-commits lighthouse-history.json back
            # to this same branch after every deploy. If one of those landed
            # while this run was busy regenerating baselines, a bare push is
            # rejected as non-fast-forward. Rebase our commit onto the remote
            # tip first — lighthouse touches a disjoint file, so it never
            # conflicts. (Two e2e-snapshots runs WOULD collide on the baseline
            # PNGs — the `concurrency` group above prevents that overlap.)
            git pull --rebase --autostash origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
      # A push made with the default GITHUB_TOKEN does NOT trigger other
      # workflows (GitHub's loop-guard), so kick the e2e gate explicitly so
      # the freshly-committed baselines actually get verified.
      - name: Trigger the e2e gate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run e2e.yml --ref ${{ github.ref_name }}
