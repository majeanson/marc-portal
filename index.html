<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f1e6" />
    <meta
      name="description"
      content="Marc, dev québécois. Soir et fin de semaine, j'aide les gens à régler des problèmes du quotidien avec des petits logiciels. Async, à ton rythme."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Bonjour design tokens — typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marcportal.com/" />
    <meta property="og:title" content="Marc — dev québécois, async, problèmes du quotidien" />
    <meta
      property="og:description"
      content="Soir et fin de semaine, j'aide les gens à régler des problèmes du quotidien avec des petits logiciels. Async, démos testables, pas de calls."
    />
    <!-- PNG, not SVG: Slack, iMessage and Discord silently drop
         SVG OG images. Regenerate from og-image.svg via
         `node scripts/build-og-image.mjs` when the design changes. -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="marc.portal — Dev québécois. Job de jour. Le soir, j'aide."
    />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:locale:alternate" content="en_CA" />

    <!-- Hreflang — injected by functions/_middleware.ts at edge so crawlers
         see them without JS. We can't put bare-path href values directly in
         this file because Vite resolves them as asset references. The
         middleware writes per-page mappings (FR <-> EN of the current path)
         using HTMLRewriter. -->

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Marc — dev québécois, async" />
    <meta
      name="twitter:description"
      content="Soir et fin de semaine, j'aide les gens à régler des problèmes du quotidien avec des petits logiciels."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="marc.portal — Dev québécois. Job de jour. Le soir, j'aide."
    />

    <title>Marc — dev québécois, async, problèmes du quotidien</title>

    <!-- Theme bootstrap — must run before React mounts so html[data-theme]
         is set on first paint (no flash-of-cream for night-mode returners).
         Lives as a separate file so the strict CSP `script-src 'self'`
         doesn't need an `'unsafe-inline'` exception. -->
    <script src="/theme-bootstrap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
