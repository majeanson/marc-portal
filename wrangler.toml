name = "marc-portal"
compatibility_date = "2026-01-15"
# nodejs_compat enables Node-style globals (Buffer, process) inside Pages
# Functions. Needed by workers-og (which uses satori → resvg WASM) and by
# any future Function that pulls in a Node-shaped dep. Cheap to enable; no
# runtime cost when unused.
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 — Cloudflare's serverless SQLite. Backs sessions, messages, magic-link tokens.
# Marc must run `npx wrangler d1 create marc-portal-db --location enam` once,
# then paste the resulting database_id below. Until then, Pages Functions that
# touch D1 will return 500 in production.
#
# Loi 25 / Quebec data residency: the `enam` (Eastern North America) hint pins
# the primary region to Toronto, the closest Canadian D1 region. The footer's
# "Hébergé au Canada" claim is hollow without it. If this database was created
# without the hint, CF Support can move it; the migration is offline (~30 min).
# See /confidentialite for the policy version visitors see.
[[d1_databases]]
binding = "DB"
database_name = "marc-portal-db"
database_id = "d8c8de13-7971-451e-836d-cf4165bd7104"
migrations_dir = "functions/db/migrations"

# Required env vars (set in Cloudflare Pages dashboard -> Settings -> Environment variables):
#   RESEND_API_KEY        - from resend.com (free tier, 100/day)
#   ADMIN_EMAILS          - comma-separated allowlist, e.g. "marc.jeanson92@gmail.com"
#   SESSION_SECRET        - 32+ random bytes hex, e.g. `openssl rand -hex 32`
#
# Optional R2 binding for message attachments (feat-message-attachments).
# When unset, the attachment endpoints return 503; everything else (sessions,
# threads without files) keeps working. To enable:
#   1. npx wrangler r2 bucket create marc-portal-media
#   2. Uncomment the block below
#   3. Redeploy — the attachment UI then unlocks automatically
#
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "marc-portal-media"
preview_bucket_name = "marc-portal-media"

# Workers AI (feat-message-media). Cloudflare's in-network inference, used to
# transcribe voice notes with Whisper (functions/_lib/transcribe.ts). The
# binding has no resource to provision — enabling it is just this block. When
# the block is absent, voice notes still upload + play; they carry a null
# transcript (graceful degrade). Loi 25: Whisper runs inside Cloudflare, so a
# voice recording never reaches a separate processor — see docs/loi-25-pia.md.
[ai]
binding = "AI"

# Stripe — plaintext config (the Price ID for the $200/yr custodian
# subscription). Per the wrangler-toml-managed-vars constraint of this project,
# plaintext vars MUST live here, not in the dashboard (the dashboard's
# "Variables and Secrets" only edits encrypted secrets when in wrangler-toml-
# managed mode). Set these to the real price_ids from Stripe Dashboard →
# Products after creating the recurring custodian products. Until then, that
# plan's custodian Checkout flow returns 503 gracefully.
#
# The secrets (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET) are set via
# `wrangler secret put STRIPE_SECRET_KEY` etc. — never commit them.
[vars]
# Stripe Price IDs for the two annual custodian plans — Watch ($120/yr) and
# Care ($400/yr). Create each as a recurring CAD price in the Stripe Dashboard
# (test mode now, live mode at the test→live cutover — Stripe isolates the
# catalogs) and paste the price_xxx here.
STRIPE_CUSTODIAN_WATCH_PRICE_ID = ""
STRIPE_CUSTODIAN_CARE_PRICE_ID = ""

# Optional env vars (feat-2026-018 — automate buyer custom-domain attach).
# When all three are set, /admin/fleet/new attaches the buyer's domain to this
# Pages project automatically. When any is unset, the wizard falls back to
# manual instructions (operator adds the domain in the CF dashboard).
#   CF_API_TOKEN          - token with "Cloudflare Pages: Edit" permission,
#                            scoped to the account that owns this project
#   CF_ACCOUNT_ID         - the account UUID (visible in CF dashboard URL)
#   CF_PAGES_PROJECT_NAME - this project's slug, e.g. "marc-portal"

# Note on Sentry: the DSN is hardcoded in src/lib/sentry.ts (browser SDK)
# and functions/_lib/sentry.ts (Pages Functions). DSNs are public-by-design
# — they authorize writes to one Sentry project and are already shipped to
# every visitor inside the SPA bundle. Committing them in source is the
# documented Sentry pattern, and keeps env-var plumbing out of the
# build-vs-runtime split: Vite reads process.env at BUILD time (would need
# GitHub Actions env vars), wrangler.toml [vars] is RUNTIME-only. Two
# surfaces, two failure modes — hardcoding collapses both. Rotation:
# Sentry → Settings → Client Keys (DSN) → Rotate, update the two source
# files, push.
